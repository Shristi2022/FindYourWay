name: Node.js CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install backend dependencies
      working-directory: backend
      run: npm install
    - name: Run backend lint checks
      working-directory: backend
      run: npm test || echo "No test script defined"
